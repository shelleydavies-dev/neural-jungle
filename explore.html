<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore — The Neural Jungle</title>
  <meta name="description" content="Explore the four terrains of your nervous system.">
  <meta property="og:title" content="The Neural Jungle — Explore">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#000000">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* Brain canvas — fills viewport */
    .brain-map {
      position: absolute;
      inset: 0;
    }

    .brain-map canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Header */
    .map-header {
      position: fixed;
      top: 2rem;
      left: 2.5rem;
      z-index: 10;
      opacity: 0;
      animation: fade-up 1s ease 0.3s forwards;
    }

    .map-header .title {
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #fff;
    }

    .map-header .breadcrumb {
      color: #555;
    }

    .map-header .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.8rem;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #555;
      text-decoration: none;
      transition: color 0.3s;
    }

    .map-header .back-link:hover { color: #fff; }

    /* Region hotspots */
    .region {
      position: absolute;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.3s ease;
    }

    .region:hover { transform: scale(1.05); }

    .region-ring {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.4s, box-shadow 0.4s, background 0.4s;
    }

    .region:hover .region-ring {
      border-color: var(--accent);
      box-shadow: 0 0 30px var(--glow), 0 0 60px var(--glow-far);
      background: var(--glow-far);
    }

    .region-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transition: background 0.4s, box-shadow 0.4s;
    }

    .region:hover .region-dot {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    .region-label {
      margin-top: 0.6rem;
      font-size: 0.55rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #555;
      transition: color 0.3s;
      white-space: nowrap;
    }

    .region:hover .region-label { color: var(--accent); }

    .region-name {
      margin-top: 0.2rem;
      font-size: 0.5rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: #333;
      text-transform: uppercase;
      transition: color 0.3s;
      white-space: nowrap;
    }

    .region:hover .region-name { color: #555; }

    /* Region accent colors */
    .region--grief {
      --accent: #5ba8c8;
      --glow: rgba(91,168,200,0.15);
      --glow-far: rgba(91,168,200,0.05);
    }
    .region--numbness {
      --accent: #7a9a8a;
      --glow: rgba(122,154,138,0.15);
      --glow-far: rgba(122,154,138,0.05);
    }
    .region--addictions {
      --accent: #e8a44a;
      --glow: rgba(232,164,74,0.15);
      --glow-far: rgba(232,164,74,0.05);
    }
    .region--depression {
      --accent: #9b7ecb;
      --glow: rgba(155,126,203,0.15);
      --glow-far: rgba(155,126,203,0.05);
    }

    /* Bottom text */
    .map-footer {
      position: fixed;
      bottom: 2rem;
      left: 2.5rem;
      z-index: 10;
      opacity: 0;
      animation: fade-up 1s ease 0.6s forwards;
    }

    .map-footer p {
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: #444;
      max-width: 300px;
      line-height: 1.7;
    }

    /* Transition overlay */
    .page-transition {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #000;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }

    .page-transition.entering {
      opacity: 1;
      animation: fade-out-overlay 0.8s ease 0.2s forwards;
    }

    .page-transition.leaving {
      opacity: 1;
      pointer-events: all;
    }

    @keyframes fade-out-overlay {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Regions fade in */
    .region {
      opacity: 0;
      animation: fade-up 0.8s ease forwards;
    }
    .region:nth-child(1) { animation-delay: 0.8s; }
    .region:nth-child(2) { animation-delay: 1.0s; }
    .region:nth-child(3) { animation-delay: 1.2s; }
    .region:nth-child(4) { animation-delay: 1.4s; }

    @media (max-width: 700px) {
      .region-ring { width: 50px; height: 50px; }
      .region-label { font-size: 0.5rem; }
      .region-name { display: none; }
      .map-header { top: 1.5rem; left: 1.5rem; }
      .map-footer { bottom: 1.5rem; left: 1.5rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .region, .map-header, .map-footer {
        animation: none;
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="page-transition entering"></div>

  <!-- Brain particle canvas -->
  <div class="brain-map">
    <canvas id="brain"></canvas>
  </div>

  <!-- Header -->
  <div class="map-header">
    <div class="title">The Neural Jungle <span class="breadcrumb">/ Map</span></div>
    <a href="index.html" class="back-link">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Back
    </a>
  </div>

  <!-- Region Hotspots (positioned by JS based on brain layout) -->
  <div id="regions">
    <a href="depression.html" class="region region--depression" id="region-depression" data-transition>
      <div class="region-ring"><div class="region-dot"></div></div>
      <span class="region-label">Depression</span>
      <span class="region-name">Prefrontal Cortex</span>
    </a>
    <a href="grief.html" class="region region--grief" id="region-grief" data-transition>
      <div class="region-ring"><div class="region-dot"></div></div>
      <span class="region-label">Grief</span>
      <span class="region-name">Amygdala</span>
    </a>
    <a href="addictions.html" class="region region--addictions" id="region-addictions" data-transition>
      <div class="region-ring"><div class="region-dot"></div></div>
      <span class="region-label">Addictions</span>
      <span class="region-name">Reward Circuit</span>
    </a>
    <a href="numbness.html" class="region region--numbness" id="region-numbness" data-transition>
      <div class="region-ring"><div class="region-dot"></div></div>
      <span class="region-label">Numbness</span>
      <span class="region-name">Brain Stem</span>
    </a>
  </div>

  <!-- Footer -->
  <div class="map-footer">
    <p>Select a region of the nervous system to explore its terrain.</p>
  </div>

  <script>
  (function () {
    'use strict';

    var canvas = document.getElementById('brain');
    if (!canvas) return;

    var ctx = canvas.getContext('2d');
    var dpr = window.devicePixelRatio || 1;
    var W, H;
    var particles = [];
    var connections = [];
    var PARTICLE_COUNT = 500;
    var CONNECTION_DIST = 28;
    var prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    /* Brain outline (normalised 0-1, profile facing left) */
    var brainOutline = [
      [0.28, 0.62], [0.22, 0.52], [0.18, 0.42], [0.17, 0.32],
      [0.20, 0.22], [0.28, 0.14], [0.38, 0.08],
      [0.48, 0.05], [0.55, 0.06],
      [0.65, 0.10], [0.73, 0.18], [0.78, 0.28],
      [0.80, 0.40], [0.78, 0.52], [0.73, 0.60],
      [0.70, 0.65],
      [0.74, 0.70], [0.76, 0.78], [0.72, 0.84], [0.64, 0.87],
      [0.56, 0.84], [0.52, 0.90], [0.48, 0.92], [0.46, 0.88], [0.44, 0.82],
      [0.40, 0.76], [0.35, 0.70], [0.30, 0.66]
    ];

    var fissures = [
      [[0.52, 0.10], [0.50, 0.22], [0.48, 0.35], [0.50, 0.48]],
      [[0.38, 0.48], [0.48, 0.50], [0.58, 0.52], [0.66, 0.56]],
      [[0.25, 0.30], [0.32, 0.28], [0.40, 0.26], [0.45, 0.20]],
      [[0.58, 0.15], [0.62, 0.22], [0.68, 0.30], [0.72, 0.38]],
      [[0.68, 0.62], [0.70, 0.66], [0.70, 0.70]]
    ];

    /* Brain region bounding areas (normalised) for accent colouring */
    var regions = {
      depression:  { cx: 0.24, cy: 0.30, r: 0.10 },  // Prefrontal cortex (front-top)
      grief:       { cx: 0.42, cy: 0.60, r: 0.09 },  // Amygdala (temporal, mid-lower)
      addictions:  { cx: 0.35, cy: 0.45, r: 0.09 },  // Nucleus accumbens (deep frontal)
      numbness:    { cx: 0.66, cy: 0.80, r: 0.09 }   // Brain stem (bottom-back)
    };

    var accentColors = {
      depression: [155, 126, 203],
      grief:      [91, 168, 200],
      addictions: [232, 164, 74],
      numbness:   [122, 154, 138]
    };

    var hoveredRegion = null;

    function resize() {
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function pointInBrain(px, py) {
      var inside = false;
      for (var i = 0, j = brainOutline.length - 1; i < brainOutline.length; j = i++) {
        var xi = brainOutline[i][0], yi = brainOutline[i][1];
        var xj = brainOutline[j][0], yj = brainOutline[j][1];
        if (((yi > py) !== (yj > py)) && (px < (xj - xi) * (py - yi) / (yj - yi) + xi)) {
          inside = !inside;
        }
      }
      return inside;
    }

    function sampleOutline(jitter) {
      var idx = Math.floor(Math.random() * brainOutline.length);
      var next = (idx + 1) % brainOutline.length;
      var t = Math.random();
      return [
        brainOutline[idx][0] + (brainOutline[next][0] - brainOutline[idx][0]) * t + (Math.random() - 0.5) * jitter,
        brainOutline[idx][1] + (brainOutline[next][1] - brainOutline[idx][1]) * t + (Math.random() - 0.5) * jitter
      ];
    }

    function sampleFissure() {
      var f = fissures[Math.floor(Math.random() * fissures.length)];
      var idx = Math.floor(Math.random() * (f.length - 1));
      var t = Math.random();
      return [
        f[idx][0] + (f[idx + 1][0] - f[idx][0]) * t + (Math.random() - 0.5) * 0.02,
        f[idx][1] + (f[idx + 1][1] - f[idx][1]) * t + (Math.random() - 0.5) * 0.02
      ];
    }

    /* Determine which region a normalised point belongs to */
    function getRegion(nx, ny) {
      for (var key in regions) {
        var r = regions[key];
        var dx = nx - r.cx, dy = ny - r.cy;
        if (Math.sqrt(dx * dx + dy * dy) < r.r) return key;
      }
      return null;
    }

    /* Convert normalised coords to canvas coords (brain centred in viewport) */
    var brainScale, brainOffX, brainOffY;

    function calcBrainTransform() {
      // Brain fills ~60% of the smaller dimension, centered slightly right
      var s = Math.min(W, H) * 0.85;
      brainScale = s;
      brainOffX = (W - s) / 2 + s * 0.05;
      brainOffY = (H - s) / 2 - s * 0.02;
    }

    function toCanvas(nx, ny) {
      return [brainOffX + nx * brainScale, brainOffY + ny * brainScale];
    }

    function createParticles() {
      particles = [];
      connections = [];
      calcBrainTransform();

      // Outline particles (25%)
      for (var i = 0; i < PARTICLE_COUNT * 0.25; i++) {
        var p = sampleOutline(0.025);
        var c = toCanvas(p[0], p[1]);
        particles.push(makeParticle(c[0], c[1], p[0], p[1], 0.4 + Math.random() * 0.5, 0.12 + Math.random() * 0.3));
      }

      // Fissure particles (12%)
      for (var i = 0; i < PARTICLE_COUNT * 0.12; i++) {
        var p = sampleFissure();
        var c = toCanvas(p[0], p[1]);
        particles.push(makeParticle(c[0], c[1], p[0], p[1], 0.4 + Math.random() * 0.5, 0.2 + Math.random() * 0.4));
      }

      // Interior particles (55%)
      var interior = Math.floor(PARTICLE_COUNT * 0.55);
      var placed = 0, attempts = 0;
      while (placed < interior && attempts < interior * 20) {
        attempts++;
        var nx = 0.15 + Math.random() * 0.68;
        var ny = 0.03 + Math.random() * 0.92;
        if (pointInBrain(nx, ny)) {
          var c = toCanvas(nx, ny);
          particles.push(makeParticle(c[0], c[1], nx, ny, 0.5 + Math.random() * 1.0, 0.08 + Math.random() * 0.5));
          placed++;
        }
      }

      // Dendrite scatter (8%)
      for (var i = 0; i < PARTICLE_COUNT * 0.08; i++) {
        var p = sampleOutline(0.06);
        var dx = p[0] - 0.5, dy = p[1] - 0.5;
        var d = Math.sqrt(dx * dx + dy * dy) || 1;
        var push = 0.02 + Math.random() * 0.05;
        var nx = p[0] + (dx / d) * push;
        var ny = p[1] + (dy / d) * push;
        var c = toCanvas(nx, ny);
        particles.push(makeParticle(c[0], c[1], nx, ny, 0.3 + Math.random() * 0.5, 0.06 + Math.random() * 0.15));
      }

      buildConnections();
    }

    function makeParticle(x, y, nx, ny, size, opacity) {
      return {
        x: x, y: y, baseX: x, baseY: y,
        nx: nx, ny: ny,
        region: getRegion(nx, ny),
        size: size, opacity: opacity,
        driftSpeed: 0.12 + Math.random() * 0.4,
        driftRadius: 0.6 + Math.random() * 2,
        phase: Math.random() * Math.PI * 2,
        twinkleSpeed: 0.3 + Math.random() * 1
      };
    }

    function buildConnections() {
      connections = [];
      for (var i = 0; i < particles.length; i++) {
        var found = 0;
        for (var j = i + 1; j < particles.length && found < 2; j++) {
          var dx = particles[i].baseX - particles[j].baseX;
          var dy = particles[i].baseY - particles[j].baseY;
          var dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < CONNECTION_DIST && dist > 4 && Math.random() < 0.3) {
            connections.push({
              a: i, b: j,
              opacity: 0.03 + (1 - dist / CONNECTION_DIST) * 0.06,
              cx: (particles[i].baseX + particles[j].baseX) / 2 + (Math.random() - 0.5) * 8,
              cy: (particles[i].baseY + particles[j].baseY) / 2 + (Math.random() - 0.5) * 8
            });
            found++;
          }
        }
      }
    }

    var time = 0;

    function draw() {
      ctx.clearRect(0, 0, W, H);
      time += 0.016;

      // Connections
      for (var c = 0; c < connections.length; c++) {
        var conn = connections[c];
        var a = particles[conn.a], b = particles[conn.b];
        var connRegion = a.region || b.region;
        var isHovered = hoveredRegion && connRegion === hoveredRegion;

        ctx.globalAlpha = isHovered ? conn.opacity * 3 : conn.opacity;
        if (isHovered && accentColors[hoveredRegion]) {
          var ac = accentColors[hoveredRegion];
          ctx.strokeStyle = 'rgb(' + ac[0] + ',' + ac[1] + ',' + ac[2] + ')';
        } else {
          ctx.strokeStyle = '#fff';
        }
        ctx.lineWidth = 0.4;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.quadraticCurveTo(conn.cx, conn.cy, b.x, b.y);
        ctx.stroke();
      }

      // Particles
      for (var i = 0; i < particles.length; i++) {
        var p = particles[i];
        var isHovered = hoveredRegion && p.region === hoveredRegion;

        if (!prefersReducedMotion) {
          p.x = p.baseX + Math.cos(time * p.driftSpeed + p.phase) * p.driftRadius;
          p.y = p.baseY + Math.sin(time * p.driftSpeed * 0.7 + p.phase) * p.driftRadius;
          var twinkle = 0.5 + 0.5 * Math.sin(time * p.twinkleSpeed + p.phase);
          ctx.globalAlpha = p.opacity * (0.4 + twinkle * 0.6);
        } else {
          ctx.globalAlpha = p.opacity;
        }

        if (isHovered) {
          var ac = accentColors[hoveredRegion];
          ctx.fillStyle = 'rgb(' + ac[0] + ',' + ac[1] + ',' + ac[2] + ')';
          ctx.globalAlpha = Math.min(1, ctx.globalAlpha * 2.5);
        } else {
          ctx.fillStyle = '#fff';
        }

        ctx.beginPath();
        ctx.arc(p.x, p.y, isHovered ? p.size * 1.3 : p.size, 0, Math.PI * 2);
        ctx.fill();
      }

      if (!prefersReducedMotion) {
        requestAnimationFrame(draw);
      }
    }

    /* --- Position region hotspots over the brain --- */
    function positionRegions() {
      calcBrainTransform();
      for (var key in regions) {
        var el = document.getElementById('region-' + key);
        if (!el) continue;
        var r = regions[key];
        var pos = toCanvas(r.cx, r.cy);
        el.style.left = pos[0] + 'px';
        el.style.top = pos[1] + 'px';
        el.style.transform = 'translate(-50%, -50%)';
      }
    }

    /* --- Region hover tracking --- */
    function initRegionHovers() {
      var regionEls = document.querySelectorAll('.region');
      regionEls.forEach(function (el) {
        var key = el.id.replace('region-', '');
        el.addEventListener('mouseenter', function () { hoveredRegion = key; });
        el.addEventListener('mouseleave', function () { hoveredRegion = null; });
      });
    }

    /* --- Page transitions --- */
    function initTransitions() {
      document.addEventListener('click', function (e) {
        var link = e.target.closest('[data-transition]');
        if (link && link.href) {
          e.preventDefault();
          var overlay = document.querySelector('.page-transition');
          if (overlay) {
            overlay.className = 'page-transition leaving';
            setTimeout(function () { window.location.href = link.href; }, 600);
          } else {
            window.location.href = link.href;
          }
        }
      });
    }

    /* --- Init --- */
    resize();
    createParticles();
    draw();
    positionRegions();
    initRegionHovers();
    initTransitions();

    window.addEventListener('resize', function () {
      resize();
      createParticles();
      positionRegions();
      if (prefersReducedMotion) draw();
    });
  })();
  </script>
</body>
</html>
