<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Neural Jungle</title>
  <meta name="description" content="An immersive journey through the nervous system, where neuroscience meets jungle mythology.">
  <meta property="og:title" content="The Neural Jungle">
  <meta property="og:description" content="A mythic map of your nervous system.">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#141e18">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #141e18;
      color: #f2f5ef;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      cursor: default;
    }

    .particle-cloud {
      position: absolute;
      top: 50%;
      left: 55%;
      transform: translate(-50%, -52%);
      width: 700px;
      height: 600px;
    }

    .particle-cloud canvas { display: block; }

    .splash-title {
      position: fixed;
      bottom: 3rem;
      left: 3.5rem;
      font-size: 0.95rem;
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #f2f5ef;
      opacity: 0;
      animation: fade-in-title 1.5s ease 0.5s forwards;
    }

    .enter-btn {
      position: fixed;
      bottom: 2.6rem;
      left: 50%;
      transform: translateX(-50%);
      display: inline-block;
      padding: 0.7rem 3rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #f2f5ef;
      text-decoration: none;
      border: 1px solid rgba(160,210,150,0.2);
      border-radius: 30px;
      transition: border-color 0.4s ease, background 0.4s ease;
      opacity: 0;
      animation: fade-in 1.5s ease 1s forwards;
    }

    .enter-btn:hover {
      border-color: rgba(160,210,150,0.6);
      background: rgba(160,210,150,0.04);
    }

    .page-transition {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #141e18;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }

    .page-transition.active {
      opacity: 1;
      pointer-events: all;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateX(-50%) translateY(8px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    @keyframes fade-in-title {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .splash-title {
        bottom: 2rem;
        left: 2rem;
        font-size: 0.75rem;
        letter-spacing: 0.25em;
      }
      .enter-btn { bottom: 1.8rem; }
      .particle-cloud {
        width: 360px;
        height: 320px;
        left: 50%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .splash-title, .enter-btn {
        animation: none;
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="page-transition"></div>

  <div class="particle-cloud">
    <canvas id="particles"></canvas>
  </div>

  <div class="splash-title">The Neural Jungle</div>

  <a href="explore.html" class="enter-btn" id="enter-btn">Enter</a>

  <script>
  (function () {
    'use strict';

    var canvas = document.getElementById('particles');
    if (!canvas) return;

    var ctx = canvas.getContext('2d');
    var dpr = window.devicePixelRatio || 1;
    var container = canvas.parentElement;
    var W, H;
    var particles = [];
    var connections = [];
    var firings = [];       // Active neuron firing pulses
    var travellers = [];    // Particles travelling along connections
    var PARTICLE_COUNT = 800;
    var CONNECTION_DIST = 30;
    var prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    /* --- Brain silhouette (profile, normalised 0-1) --- */
    var brainOutline = [
      [0.28,0.62],[0.22,0.52],[0.18,0.42],[0.17,0.32],
      [0.20,0.22],[0.28,0.14],[0.38,0.08],
      [0.48,0.05],[0.55,0.06],
      [0.65,0.10],[0.73,0.18],[0.78,0.28],
      [0.80,0.40],[0.78,0.52],[0.73,0.60],
      [0.70,0.65],[0.74,0.70],[0.76,0.78],[0.72,0.84],[0.64,0.87],
      [0.56,0.84],[0.52,0.90],[0.48,0.92],[0.46,0.88],[0.44,0.82],
      [0.40,0.76],[0.35,0.70],[0.30,0.66]
    ];

    /* Fissure curves (internal brain folds) */
    var fissures = [
      [[0.52,0.10],[0.50,0.22],[0.48,0.35],[0.50,0.48]],
      [[0.38,0.48],[0.48,0.50],[0.58,0.52],[0.66,0.56]],
      [[0.25,0.30],[0.32,0.28],[0.40,0.26],[0.45,0.20]],
      [[0.58,0.15],[0.62,0.22],[0.68,0.30],[0.72,0.38]],
      [[0.68,0.62],[0.70,0.66],[0.70,0.70]],
      // Extra folds for density
      [[0.30,0.38],[0.35,0.35],[0.42,0.34],[0.48,0.30]],
      [[0.55,0.30],[0.60,0.35],[0.65,0.42],[0.70,0.48]],
      [[0.32,0.52],[0.38,0.56],[0.44,0.58],[0.50,0.58]]
    ];

    var padX, padY, scaleX, scaleY;

    function resize() {
      W = container.offsetWidth;
      H = container.offsetHeight;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      padX = W * 0.05; padY = H * 0.02;
      scaleX = W * 0.9; scaleY = H * 0.96;
    }

    function pointInBrain(px, py) {
      var inside = false;
      for (var i = 0, j = brainOutline.length - 1; i < brainOutline.length; j = i++) {
        var xi = brainOutline[i][0], yi = brainOutline[i][1];
        var xj = brainOutline[j][0], yj = brainOutline[j][1];
        if (((yi > py) !== (yj > py)) && (px < (xj - xi) * (py - yi) / (yj - yi) + xi))
          inside = !inside;
      }
      return inside;
    }

    function toCanvas(nx, ny) {
      return [padX + nx * scaleX, padY + ny * scaleY];
    }

    function sampleOutline(jitter) {
      var idx = Math.floor(Math.random() * brainOutline.length);
      var next = (idx + 1) % brainOutline.length;
      var t = Math.random();
      return [
        brainOutline[idx][0] + (brainOutline[next][0] - brainOutline[idx][0]) * t + (Math.random()-0.5) * jitter,
        brainOutline[idx][1] + (brainOutline[next][1] - brainOutline[idx][1]) * t + (Math.random()-0.5) * jitter
      ];
    }

    function sampleFissure() {
      var f = fissures[Math.floor(Math.random() * fissures.length)];
      var i = Math.floor(Math.random() * (f.length - 1));
      var t = Math.random();
      return [
        f[i][0] + (f[i+1][0] - f[i][0]) * t + (Math.random()-0.5) * 0.015,
        f[i][1] + (f[i+1][1] - f[i][1]) * t + (Math.random()-0.5) * 0.015
      ];
    }

    /* --- Distance from edge (0=edge, 1=center) for brightness falloff --- */
    function edgeDist(nx, ny) {
      var cx = 0.48, cy = 0.48;
      var dx = nx - cx, dy = ny - cy;
      return Math.sqrt(dx*dx + dy*dy);
    }

    function createParticles() {
      particles = []; connections = [];

      // --- Outline particles (35%) — bright, define silhouette clearly ---
      var outlineCount = Math.floor(PARTICLE_COUNT * 0.35);
      for (var i = 0; i < outlineCount; i++) {
        var p = sampleOutline(0.015);
        var c = toCanvas(p[0], p[1]);
        particles.push(makeParticle(c[0], c[1], 0.5 + Math.random() * 0.6, 0.3 + Math.random() * 0.5, true));
      }

      // --- Second outline pass — very tight to edge for sharp boundary ---
      for (var i = 0; i < Math.floor(PARTICLE_COUNT * 0.1); i++) {
        var p = sampleOutline(0.005);
        var c = toCanvas(p[0], p[1]);
        particles.push(makeParticle(c[0], c[1], 0.3 + Math.random() * 0.3, 0.4 + Math.random() * 0.4, true));
      }

      // --- Fissure particles (15%) ---
      for (var i = 0; i < Math.floor(PARTICLE_COUNT * 0.15); i++) {
        var p = sampleFissure();
        var c = toCanvas(p[0], p[1]);
        particles.push(makeParticle(c[0], c[1], 0.4 + Math.random() * 0.6, 0.2 + Math.random() * 0.45, false));
      }

      // --- Interior particles (35%) ---
      var interior = Math.floor(PARTICLE_COUNT * 0.35);
      var placed = 0, attempts = 0;
      while (placed < interior && attempts < interior * 25) {
        attempts++;
        var nx = 0.15 + Math.random() * 0.68;
        var ny = 0.03 + Math.random() * 0.92;
        if (pointInBrain(nx, ny)) {
          var c = toCanvas(nx, ny);
          var d = edgeDist(nx, ny);
          // Brighter near center, dimmer at edges (already have edge particles)
          var op = 0.05 + Math.random() * 0.35;
          particles.push(makeParticle(c[0], c[1], 0.4 + Math.random() * 1.0, op, false));
          placed++;
        }
      }

      // --- Dendrite scatter (5%) — sparse halo outside ---
      for (var i = 0; i < Math.floor(PARTICLE_COUNT * 0.05); i++) {
        var p = sampleOutline(0.05);
        var cx = 0.48, cy = 0.48;
        var dx = p[0]-cx, dy = p[1]-cy;
        var d = Math.sqrt(dx*dx+dy*dy) || 1;
        p[0] += (dx/d) * (0.03 + Math.random()*0.06);
        p[1] += (dy/d) * (0.03 + Math.random()*0.06);
        var c = toCanvas(p[0], p[1]);
        particles.push(makeParticle(c[0], c[1], 0.2 + Math.random() * 0.4, 0.04 + Math.random() * 0.12, false));
      }

      buildConnections();
    }

    function makeParticle(x, y, size, opacity, isEdge) {
      return {
        x: x, y: y, baseX: x, baseY: y,
        size: size, baseSize: size,
        opacity: opacity, baseOpacity: opacity,
        isEdge: isEdge,
        driftSpeed: 0.1 + Math.random() * 0.4,
        driftRadius: 0.5 + Math.random() * 2.0,
        phase: Math.random() * Math.PI * 2,
        twinkleSpeed: 0.2 + Math.random() * 1.0,
        fireGlow: 0  // for neuron firing effect
      };
    }

    function buildConnections() {
      connections = [];
      for (var i = 0; i < particles.length; i++) {
        var found = 0;
        for (var j = i + 1; j < particles.length && found < 3; j++) {
          var dx = particles[i].baseX - particles[j].baseX;
          var dy = particles[i].baseY - particles[j].baseY;
          var dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < CONNECTION_DIST && dist > 3) {
            if (Math.random() < 0.3) {
              connections.push({
                a: i, b: j,
                opacity: 0.025 + (1 - dist/CONNECTION_DIST) * 0.06,
                cx: (particles[i].baseX + particles[j].baseX)/2 + (Math.random()-0.5)*8,
                cy: (particles[i].baseY + particles[j].baseY)/2 + (Math.random()-0.5)*8
              });
              found++;
            }
          }
        }
      }
    }

    /* --- Neuron Firing System --- */
    function triggerFiring() {
      if (particles.length === 0) return;

      // Pick a random particle to "fire"
      var idx = Math.floor(Math.random() * particles.length);
      var p = particles[idx];
      p.fireGlow = 1.0;

      // Find connected particles and propagate with delay
      var wave = [idx];
      var visited = {};
      visited[idx] = true;

      function propagate(sourceIdx, depth) {
        if (depth > 4) return;
        for (var c = 0; c < connections.length; c++) {
          var conn = connections[c];
          var targetIdx = -1;
          if (conn.a === sourceIdx && !visited[conn.b]) targetIdx = conn.b;
          if (conn.b === sourceIdx && !visited[conn.a]) targetIdx = conn.a;
          if (targetIdx >= 0) {
            visited[targetIdx] = true;
            // Launch a traveller along this connection
            travellers.push({
              conn: c,
              progress: conn.a === sourceIdx ? 0 : 1,
              direction: conn.a === sourceIdx ? 1 : -1,
              speed: 1.5 + Math.random() * 1.5,
              opacity: 0.6 - depth * 0.1
            });
            // Delayed fire on target
            (function(ti, d) {
              setTimeout(function() {
                if (particles[ti]) particles[ti].fireGlow = Math.max(0.3, 0.8 - d * 0.15);
                propagate(ti, d + 1);
              }, 80 + d * 60);
            })(targetIdx, depth);
          }
        }
      }

      propagate(idx, 0);

      // Schedule next firing
      setTimeout(triggerFiring, 600 + Math.random() * 1500);
    }

    var time = 0;

    function draw() {
      ctx.clearRect(0, 0, W, H);
      time += 0.016;

      // --- Connections ---
      for (var c = 0; c < connections.length; c++) {
        var conn = connections[c];
        var a = particles[conn.a], b = particles[conn.b];
        var glow = Math.max(a.fireGlow, b.fireGlow);
        ctx.globalAlpha = conn.opacity + glow * 0.15;
        ctx.strokeStyle = glow > 0.1 ? 'rgba(90,232,160,' + (0.3 + glow * 0.5) + ')' : '#8ab885';
        ctx.lineWidth = glow > 0.1 ? 0.6 : 0.35;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.quadraticCurveTo(conn.cx, conn.cy, b.x, b.y);
        ctx.stroke();
      }

      // --- Travellers (particles moving along connections) ---
      for (var t = travellers.length - 1; t >= 0; t--) {
        var tr = travellers[t];
        tr.progress += tr.direction * tr.speed * 0.016;
        if (tr.progress < 0 || tr.progress > 1) {
          travellers.splice(t, 1);
          continue;
        }
        var conn = connections[tr.conn];
        if (!conn) { travellers.splice(t, 1); continue; }
        var a = particles[conn.a], b = particles[conn.b];
        var p = tr.progress;
        var ip = 1 - p;
        // Quadratic bezier point
        var tx = ip*ip*a.x + 2*ip*p*conn.cx + p*p*b.x;
        var ty = ip*ip*a.y + 2*ip*p*conn.cy + p*p*b.y;

        ctx.globalAlpha = tr.opacity * (1 - Math.abs(p - 0.5) * 1.2);
        ctx.fillStyle = '#5ae8a0';
        ctx.beginPath();
        ctx.arc(tx, ty, 1.5, 0, Math.PI * 2);
        ctx.fill();
        // Glow
        ctx.globalAlpha *= 0.3;
        ctx.beginPath();
        ctx.arc(tx, ty, 4, 0, Math.PI * 2);
        ctx.fill();
      }

      // --- Particles ---
      for (var i = 0; i < particles.length; i++) {
        var p = particles[i];

        if (!prefersReducedMotion) {
          p.x = p.baseX + Math.cos(time * p.driftSpeed + p.phase) * p.driftRadius;
          p.y = p.baseY + Math.sin(time * p.driftSpeed * 0.7 + p.phase) * p.driftRadius;
          var twinkle = 0.5 + 0.5 * Math.sin(time * p.twinkleSpeed + p.phase);
          ctx.globalAlpha = p.opacity * (0.5 + twinkle * 0.5);
        } else {
          ctx.globalAlpha = p.opacity;
        }

        // Firing glow effect
        if (p.fireGlow > 0.01) {
          ctx.globalAlpha = Math.min(1, ctx.globalAlpha + p.fireGlow * 0.6);
          var gs = p.baseSize + p.fireGlow * 2;
          // Draw glow halo
          ctx.fillStyle = 'rgba(90,232,160,' + (p.fireGlow * 0.4) + ')';
          ctx.beginPath();
          ctx.arc(p.x, p.y, gs + 3, 0, Math.PI * 2);
          ctx.fill();
          // Core
          ctx.fillStyle = p.fireGlow > 0.3 ? '#b8f0c8' : '#c8e6c0';
          ctx.beginPath();
          ctx.arc(p.x, p.y, gs, 0, Math.PI * 2);
          ctx.fill();
          // Decay
          p.fireGlow *= 0.96;
        } else {
          p.fireGlow = 0;
          ctx.fillStyle = '#c8e6c0';
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      if (!prefersReducedMotion) {
        requestAnimationFrame(draw);
      }
    }

    resize();
    createParticles();
    draw();

    // Start neuron firings after a short delay
    if (!prefersReducedMotion) {
      setTimeout(triggerFiring, 1500);
    }

    window.addEventListener('resize', function () {
      resize();
      createParticles();
      if (prefersReducedMotion) draw();
    });

    // --- Page transition ---
    var enterBtn = document.getElementById('enter-btn');
    if (enterBtn) {
      enterBtn.addEventListener('click', function (e) {
        e.preventDefault();
        var overlay = document.querySelector('.page-transition');
        if (overlay) {
          overlay.classList.add('active');
          setTimeout(function () {
            window.location.href = enterBtn.href;
          }, 600);
        } else {
          window.location.href = enterBtn.href;
        }
      });
    }
  })();
  </script>
</body>
</html>
