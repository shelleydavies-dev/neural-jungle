<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Neural Jungle</title>
  <meta name="description" content="An immersive journey through the nervous system, where neuroscience meets jungle mythology.">
  <meta property="og:title" content="The Neural Jungle">
  <meta property="og:description" content="A mythic map of your nervous system.">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#000000">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      cursor: default;
    }

    .particle-cloud {
      position: absolute;
      top: 50%;
      left: 55%;
      transform: translate(-50%, -52%);
      width: 600px;
      height: 520px;
    }

    .particle-cloud canvas { display: block; }

    .splash-title {
      position: fixed;
      bottom: 3rem;
      left: 3.5rem;
      font-size: 0.95rem;
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #fff;
      opacity: 0;
      animation: fade-in-title 1.5s ease 0.5s forwards;
    }

    .enter-btn {
      position: fixed;
      bottom: 2.6rem;
      left: 50%;
      transform: translateX(-50%);
      display: inline-block;
      padding: 0.7rem 3rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #fff;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 30px;
      transition: border-color 0.4s ease, background 0.4s ease;
      opacity: 0;
      animation: fade-in 1.5s ease 1s forwards;
    }

    .enter-btn:hover {
      border-color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.04);
    }

    .page-transition {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }

    .page-transition.active {
      opacity: 1;
      pointer-events: all;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateX(-50%) translateY(8px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    @keyframes fade-in-title {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .splash-title {
        bottom: 2rem;
        left: 2rem;
        font-size: 0.75rem;
        letter-spacing: 0.25em;
      }
      .enter-btn { bottom: 1.8rem; }
      .particle-cloud {
        width: 340px;
        height: 300px;
        left: 50%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .splash-title, .enter-btn {
        animation: none;
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="page-transition"></div>

  <div class="particle-cloud">
    <canvas id="particles"></canvas>
  </div>

  <div class="splash-title">The Neural Jungle</div>

  <a href="explore.html" class="enter-btn" id="enter-btn">Enter</a>

  <script>
  (function () {
    'use strict';

    var canvas = document.getElementById('particles');
    if (!canvas) return;

    var ctx = canvas.getContext('2d');
    var dpr = window.devicePixelRatio || 1;
    var container = canvas.parentElement;
    var W, H;
    var particles = [];
    var connections = [];
    var PARTICLE_COUNT = 450;
    var CONNECTION_DIST = 35;
    var prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    /* ------------------------------------------------
       Brain silhouette (profile view, normalised 0-1)
       Points trace clockwise from frontal-bottom
       ------------------------------------------------ */
    var brainOutline = [
      // Frontal lobe bottom
      [0.28, 0.62],
      [0.22, 0.52],
      [0.18, 0.42],
      [0.17, 0.32],
      // Frontal top
      [0.20, 0.22],
      [0.28, 0.14],
      [0.38, 0.08],
      // Crown
      [0.48, 0.05],
      [0.55, 0.06],
      // Parietal
      [0.65, 0.10],
      [0.73, 0.18],
      [0.78, 0.28],
      // Occipital
      [0.80, 0.40],
      [0.78, 0.52],
      [0.73, 0.60],
      // Cerebellum junction
      [0.70, 0.65],
      // Cerebellum
      [0.74, 0.70],
      [0.76, 0.78],
      [0.72, 0.84],
      [0.64, 0.87],
      // Brain stem
      [0.56, 0.84],
      [0.52, 0.90],
      [0.48, 0.92],
      [0.46, 0.88],
      [0.44, 0.82],
      // Temporal lobe
      [0.40, 0.76],
      [0.35, 0.70],
      [0.30, 0.66]
    ];

    /* Fissure curves (internal brain folds) */
    var fissures = [
      // Central sulcus
      [[0.52, 0.10], [0.50, 0.22], [0.48, 0.35], [0.50, 0.48]],
      // Lateral fissure
      [[0.38, 0.48], [0.48, 0.50], [0.58, 0.52], [0.66, 0.56]],
      // Frontal fold
      [[0.25, 0.30], [0.32, 0.28], [0.40, 0.26], [0.45, 0.20]],
      // Parietal fold
      [[0.58, 0.15], [0.62, 0.22], [0.68, 0.30], [0.72, 0.38]],
      // Occipital-cerebellum divide
      [[0.68, 0.62], [0.70, 0.66], [0.70, 0.70]]
    ];

    function resize() {
      W = container.offsetWidth;
      H = container.offsetHeight;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    /* --- Point-in-brain test (ray casting) --- */
    function pointInBrain(px, py, outline) {
      var inside = false;
      for (var i = 0, j = outline.length - 1; i < outline.length; j = i++) {
        var xi = outline[i][0], yi = outline[i][1];
        var xj = outline[j][0], yj = outline[j][1];
        if (((yi > py) !== (yj > py)) && (px < (xj - xi) * (py - yi) / (yj - yi) + xi)) {
          inside = !inside;
        }
      }
      return inside;
    }

    /* --- Sample point along outline with jitter --- */
    function sampleOutline(outline, jitter) {
      var idx = Math.floor(Math.random() * outline.length);
      var next = (idx + 1) % outline.length;
      var t = Math.random();
      var x = outline[idx][0] + (outline[next][0] - outline[idx][0]) * t;
      var y = outline[idx][1] + (outline[next][1] - outline[idx][1]) * t;
      x += (Math.random() - 0.5) * jitter;
      y += (Math.random() - 0.5) * jitter;
      return [x, y];
    }

    /* --- Sample point along a fissure --- */
    function sampleFissure(fissure, jitter) {
      var idx = Math.floor(Math.random() * (fissure.length - 1));
      var t = Math.random();
      var x = fissure[idx][0] + (fissure[idx + 1][0] - fissure[idx][0]) * t;
      var y = fissure[idx][1] + (fissure[idx + 1][1] - fissure[idx][1]) * t;
      x += (Math.random() - 0.5) * jitter;
      y += (Math.random() - 0.5) * jitter;
      return [x, y];
    }

    function createParticles() {
      particles = [];
      connections = [];

      var padX = W * 0.05;
      var padY = H * 0.02;
      var scaleX = W * 0.9;
      var scaleY = H * 0.96;

      // Scale outline to canvas coordinates
      var scaledOutline = brainOutline.map(function (p) {
        return [padX + p[0] * scaleX, padY + p[1] * scaleY];
      });

      var placed = 0;
      var attempts = 0;

      // --- Outline particles (30%) - define the silhouette ---
      var outlineCount = Math.floor(PARTICLE_COUNT * 0.25);
      for (var i = 0; i < outlineCount; i++) {
        var op = sampleOutline(brainOutline, 0.025);
        var px = padX + op[0] * scaleX;
        var py = padY + op[1] * scaleY;
        particles.push(makeParticle(px, py, 0.4 + Math.random() * 0.5, 0.15 + Math.random() * 0.35));
      }
      placed += outlineCount;

      // --- Fissure particles (15%) - internal brain folds ---
      var fissureCount = Math.floor(PARTICLE_COUNT * 0.15);
      for (var i = 0; i < fissureCount; i++) {
        var fissure = fissures[Math.floor(Math.random() * fissures.length)];
        var fp = sampleFissure(fissure, 0.02);
        var px = padX + fp[0] * scaleX;
        var py = padY + fp[1] * scaleY;
        particles.push(makeParticle(px, py, 0.4 + Math.random() * 0.6, 0.2 + Math.random() * 0.5));
      }
      placed += fissureCount;

      // --- Interior particles (50%) - fill the brain shape ---
      var interiorCount = PARTICLE_COUNT - placed - Math.floor(PARTICLE_COUNT * 0.08);
      var interiorPlaced = 0;
      attempts = 0;
      while (interiorPlaced < interiorCount && attempts < interiorCount * 20) {
        attempts++;
        var nx = Math.random();
        var ny = Math.random();
        if (pointInBrain(nx, ny, brainOutline)) {
          var px = padX + nx * scaleX;
          var py = padY + ny * scaleY;
          particles.push(makeParticle(px, py, 0.5 + Math.random() * 1.2, 0.1 + Math.random() * 0.55));
          interiorPlaced++;
        }
      }

      // --- Dendrite scatter (8%) - outside the brain, like neural dust ---
      var dendriteCount = Math.floor(PARTICLE_COUNT * 0.08);
      for (var i = 0; i < dendriteCount; i++) {
        var op = sampleOutline(brainOutline, 0.06 + Math.random() * 0.04);
        // Push outward
        var cx = 0.5, cy = 0.5;
        var dx = op[0] - cx;
        var dy = op[1] - cy;
        var dist = Math.sqrt(dx * dx + dy * dy);
        var push = 0.02 + Math.random() * 0.05;
        var nx = op[0] + (dx / dist) * push;
        var ny = op[1] + (dy / dist) * push;
        var px = padX + nx * scaleX;
        var py = padY + ny * scaleY;
        particles.push(makeParticle(px, py, 0.3 + Math.random() * 0.6, 0.08 + Math.random() * 0.2));
      }

      // --- Build connection list (nearby particles) ---
      buildConnections();
    }

    function makeParticle(x, y, size, opacity) {
      return {
        x: x, y: y,
        baseX: x, baseY: y,
        size: size,
        opacity: opacity,
        driftSpeed: 0.15 + Math.random() * 0.5,
        driftRadius: 0.8 + Math.random() * 2.5,
        phase: Math.random() * Math.PI * 2,
        twinkleSpeed: 0.3 + Math.random() * 1.2
      };
    }

    function buildConnections() {
      connections = [];
      // Only connect nearby particles - gives the neural network / vine look
      for (var i = 0; i < particles.length; i++) {
        var p = particles[i];
        // Each particle connects to at most 2 neighbours
        var found = 0;
        for (var j = i + 1; j < particles.length && found < 2; j++) {
          var q = particles[j];
          var dx = p.baseX - q.baseX;
          var dy = p.baseY - q.baseY;
          var dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < CONNECTION_DIST && dist > 5) {
            // Probability decreases with distance
            if (Math.random() < 0.35) {
              connections.push({
                a: i, b: j,
                opacity: 0.04 + (1 - dist / CONNECTION_DIST) * 0.08,
                // Control point offset for slight curve (vine-like)
                cx: (p.baseX + q.baseX) / 2 + (Math.random() - 0.5) * 10,
                cy: (p.baseY + q.baseY) / 2 + (Math.random() - 0.5) * 10
              });
              found++;
            }
          }
        }
      }
    }

    var time = 0;

    function draw() {
      ctx.clearRect(0, 0, W, H);
      time += 0.016;

      // --- Draw connections first (behind particles) ---
      for (var c = 0; c < connections.length; c++) {
        var conn = connections[c];
        var a = particles[conn.a];
        var b = particles[conn.b];

        ctx.globalAlpha = conn.opacity;
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 0.4;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.quadraticCurveTo(conn.cx, conn.cy, b.x, b.y);
        ctx.stroke();
      }

      // --- Draw particles ---
      for (var i = 0; i < particles.length; i++) {
        var p = particles[i];

        if (!prefersReducedMotion) {
          p.x = p.baseX + Math.cos(time * p.driftSpeed + p.phase) * p.driftRadius;
          p.y = p.baseY + Math.sin(time * p.driftSpeed * 0.7 + p.phase) * p.driftRadius;

          var twinkle = 0.5 + 0.5 * Math.sin(time * p.twinkleSpeed + p.phase);
          ctx.globalAlpha = p.opacity * (0.4 + twinkle * 0.6);
        } else {
          ctx.globalAlpha = p.opacity;
        }

        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }

      if (!prefersReducedMotion) {
        requestAnimationFrame(draw);
      }
    }

    resize();
    createParticles();
    draw();

    window.addEventListener('resize', function () {
      resize();
      createParticles();
      if (prefersReducedMotion) draw();
    });

    // --- Page transition ---
    var enterBtn = document.getElementById('enter-btn');
    if (enterBtn) {
      enterBtn.addEventListener('click', function (e) {
        e.preventDefault();
        var overlay = document.querySelector('.page-transition');
        if (overlay) {
          overlay.classList.add('active');
          setTimeout(function () {
            window.location.href = enterBtn.href;
          }, 600);
        } else {
          window.location.href = enterBtn.href;
        }
      });
    }
  })();
  </script>
</body>
</html>
